[package]
name = "sklears-utils"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "README.md"
description = "Shared utilities for sklears: validation, data generation, helpers"
keywords = ["machine-learning", "utilities", "helpers"]
categories = ["science"]

[dependencies]
sklears-core = { workspace = true }
# SciRS2 Policy Compliant Dependencies
scirs2-core = { workspace = true }
scirs2-stats = { workspace = true }  # For statistical utilities

# ❌ REMOVED: Legacy dependencies (SciRS2 Policy violations)
# ❌ scirs2-autograd - transitional dependency removed (SciRS2 Policy)
# ❌ ndarray - use scirs2_core::ndarray instead (SciRS2 Policy)
# ❌ rand - use scirs2_core::random instead (SciRS2 Policy)
# ❌ rand_distr - use scirs2_core::random distributions instead (SciRS2 Policy)
thiserror = { workspace = true }
once_cell = { workspace = true }
num_cpus = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
rustc_version_runtime = { workspace = true }
regex = { workspace = true }
lazy_static = { workspace = true }
sysinfo = { workspace = true, optional = true }

# Optional real-GPU device enumeration (see the `gpu` feature below). GPU
# compute itself (matmul/add/mul) routes through sklears-core's
# oxicuda-backed `gpu` module; `oxicuda-driver` is only needed directly
# here for device metadata (SM count, clock rate, memory bus width) that
# `sklears_core::gpu::GpuDeviceProperties` does not expose.
oxicuda-driver = { workspace = true, optional = true }

# Optional compression support
oxiarc-deflate = { workspace = true, optional = true }

# Optional format support
serde_yaml = { workspace = true, optional = true }
toml = { workspace = true, optional = true }
serde_with = { workspace = true, optional = true }
quick-xml = { workspace = true, optional = true }

# Platform-specific dependencies for memory mapping
[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
winapi = { workspace = true, features = ["handleapi", "memoryapi", "winnt"] }

[dev-dependencies]
proptest = { workspace = true }
approx = { workspace = true }
criterion = { workspace = true }
tempfile = { workspace = true }

[features]
default = ["std", "simd"]
std = ["sklears-core/std"]
simd = []  # Enable SIMD optimizations
# Real GPU acceleration: routes `gpu_computing`'s device enumeration and
# array ops through oxicuda (via sklears-core's `gpu_support` feature),
# instead of the CPU-only default build. Honest by construction: on a host
# with no CUDA driver/device, detection returns empty/`None` rather than
# fabricating hardware.
gpu = ["sklears-core/gpu_support", "dep:oxicuda-driver"]
compression = ["oxiarc-deflate"]
sysinfo = ["dep:sysinfo"]
yaml = ["serde_yaml"]
toml_support = ["toml", "serde_with"]
xml = ["quick-xml"]
formats = ["yaml", "toml_support", "xml"]
